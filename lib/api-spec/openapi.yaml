openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Scarl - Smart Cognitive Augmented Reality Lens API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: scarl
    description: Scarl AR assistant operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /scarl/analyze:
    post:
      operationId: analyzeScene
      tags: [scarl]
      summary: Analyze a captured frame
      description: Sends an image frame to the vision AI and returns AR HUD overlays plus a spoken assistant reply.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeRequest"
      responses:
        "200":
          description: Scene analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyzeResponse"
  /scarl/status:
    get:
      operationId: systemStatus
      tags: [scarl]
      summary: HUD system status
      description: Returns Scarl system status for the top-left HUD strip.
      responses:
        "200":
          description: System status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemStatus"
  /scarl/memory:
    get:
      operationId: getMemory
      tags: [scarl]
      summary: Recent contextual memory
      description: Returns recent scene observations the assistant has seen.
      responses:
        "200":
          description: Memory entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryList"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    AnalyzeRequest:
      type: object
      properties:
        imageBase64:
          type: string
          description: Raw base64 image data (no data URL prefix).
        mimeType:
          type: string
          description: MIME type of the image, e.g. image/jpeg
        prompt:
          type: string
          description: Optional voice/text prompt from the user.
        mode:
          type: string
          description: Analysis mode (scan, identify, navigate, threat, ambient).
      required:
        - imageBase64
        - mimeType
    Overlay:
      type: object
      properties:
        id:
          type: string
        kind:
          type: string
          description: object | warning | suggestion | reminder | navigation | threat | info
        label:
          type: string
        detail:
          type: string
        severity:
          type: string
          description: low | medium | high | critical
        x:
          type: number
          description: Normalized x (0..1) of the target box center
        y:
          type: number
          description: Normalized y (0..1) of the target box center
        w:
          type: number
          description: Normalized width (0..1) of the target box
        h:
          type: number
          description: Normalized height (0..1) of the target box
      required:
        - id
        - kind
        - label
    AnalyzeResponse:
      type: object
      properties:
        sceneSummary:
          type: string
          description: One-line summary of the scene for the HUD ticker.
        spokenReply:
          type: string
          description: What the assistant should speak aloud.
        overlays:
          type: array
          items:
            $ref: "#/components/schemas/Overlay"
        primaryFocus:
          type: string
          description: The dominant subject of the frame.
        timestamp:
          type: string
      required:
        - sceneSummary
        - spokenReply
        - overlays
        - timestamp
    SystemStatus:
      type: object
      properties:
        aiOnline:
          type: boolean
        connection:
          type: string
        battery:
          type: number
        mode:
          type: string
        uptimeSeconds:
          type: number
        version:
          type: string
      required:
        - aiOnline
        - connection
        - battery
        - mode
        - uptimeSeconds
        - version
    MemoryEntry:
      type: object
      properties:
        id:
          type: string
        summary:
          type: string
        timestamp:
          type: string
        primaryFocus:
          type: string
      required:
        - id
        - summary
        - timestamp
    MemoryList:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/MemoryEntry"
      required:
        - entries
